<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haohani 的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            显示: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            背景滤镜: 模糊(10像素);
            边框圆角: 20像素;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            最大宽度: 400像素;
        }
        .avatar {
            width: 120px;
            height: 120px;
            边框圆角: 50%;
            背景: 白色;
            margin: 0 auto 20px;
            显示: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            颜色: #667eea;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .bio {
            font-size: 16px;
            透明度: 0.9;
            margin-bottom: 25px;
            行高: 1.6;
        }
        .链接 a {
            显示方式: 内联块;
            margin: 0 8px;
            padding: 10px 20px;
            背景: 白色;
            颜色: #667eea;
            文本装饰: 无;
            边框圆角: 20像素;
            字体粗细: 粗体;
            transition: 0.3s;
        }
        .links a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </样式>
</head>
<body>
    <div class="card">
        <div class="avatar">👩‍💻</div>
        <h1>你好，我是 豪哈尼</h1>
        <p class="bio">
            一个喜欢折腾的新手~<br>
            正在学习编程和网页制作<br>
            欢迎来和我交流！
        </p>
        <div 类="links">
            <a href="https://github.com/Haohani">我的GitHub</a>
            <a href="#">联系我</a>
        </div>
    </div>
</body>
    </html>
