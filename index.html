<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haohani 的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        正文 {
            font-family: "Microsoft YaHei", sans-serif;
            背景: 线性渐变(135度, #667eea0%, #764ba2100%);
            最小高度: 100视口高度;
            显示: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .容器 {
            背景: rgba(255, 255, 255, 0.15);
            背景滤镜: 模糊(10像素);
            边框圆角: 20像素;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            字体大小: 36像素;
            margin-bottom: 15px;
        }
        p {
            字体大小: 18像素;
            margin-bottom: 30px;
            透明度: 0.9;
        }
        .btn {
            显示方式: 内联块;
            padding: 12px 30px;
            背景: 白色;
            颜色: #667eea;
            文本装饰: 无;
            border-radius: 30px;
            字体粗细: 粗体;
            transition: all 0.3s ease;
        }
        .按钮:悬停 {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </样式>
</head>
<body>
    <div class="container">
        <h1>👋 你好，我是 豪哈尼</h1>
        <p>欢迎来到我的个人主页，这是用 GitHub Pages 搭建的免费网站！</p>
        <a href="#" class="btn">了解更多</a>
    </div>
</body>
    </html>
